<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MATLAB MCP — Live Agentic Demo</title>
  <link rel="stylesheet" href="/vendor/highlight-theme.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="app-header">
    <img class="logo" src="/Schaeffler_logo.svg.png" alt="Schaeffler" />
    <div class="title-block">
      <h1>MATLAB&nbsp;/&nbsp;Simulink MCP</h1>
      <p class="subtitle">internal demo tool — a chatbot that drives MATLAB/Simulink live via MCP</p>
    </div>
  </header>

  <div class="prompt-bar" role="toolbar" aria-label="Demo steps">
    <div class="step-buttons">
      <button class="prompt-btn" data-step="1" type="button">
        <span class="step-badge">1</span>Step 1
      </button>
      <button class="prompt-btn" data-step="2" type="button">
        <span class="step-badge">2</span>Step 2
      </button>
      <button class="prompt-btn" data-step="3" type="button">
        <span class="step-badge">3</span>Step 3
      </button>
      <button class="prompt-btn extra-btn" data-step="extra" type="button">
        &#9733;&nbsp;Extra-safe
      </button>
    </div>
    <button id="reset-btn" class="reset-btn" type="button">&#8635; Reset</button>
  </div>

  <main id="timeline" class="timeline" aria-live="polite">
    <div id="empty-state" class="empty-state">
      <h2 class="empty-title">MATLAB&nbsp;/&nbsp;Simulink MCP Demo</h2>
      <p class="empty-context">chatbot care conduce MATLAB/Simulink live prin MCP</p>
      <p class="empty-hint">Select a numbered step above to start, or type a custom message below.</p>
    </div>
  </main>

  <form id="composer" class="composer" autocomplete="off">
    <select id="model" name="model" title="Model" aria-label="Model">
      <option value="opus">Opus 4.8</option>
      <option value="sonnet">Sonnet 4.6</option>
      <option value="haiku">Haiku 4.5</option>
    </select>
    <input id="message" name="message" type="text"
           placeholder="Type a message and press Enter…" required />
    <button id="send" type="submit">Send</button>
  </form>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <img id="lightbox-img" alt="" />
  </div>

  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/highlight.min.js"></script>
  <script src="/vendor/matlab.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
